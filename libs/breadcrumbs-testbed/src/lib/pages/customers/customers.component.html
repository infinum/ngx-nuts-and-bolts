<h1>Customers</h1>

@if (customers$ | async; as customers) {
	<table aria-label="Table of customers">
		<thead>
			<tr>
				<th>Name</th>
				<th>Number of locations</th>
				<th>Actions</th>
			</tr>
		</thead>
		<tbody>
			@for (customer of customers; track customer.id) {
				<tr>
					<td>{{ customer.name }}</td>
					<td>{{ customer.locations.length }}</td>
					<td><a [routerLink]="customer.id">View details</a></td>
				</tr>
			}
		</tbody>
	</table>
} @else {
	<p>Loading...</p>
}
